name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Run tests
        run: pytest tests/ -q

      - name: Validation v2 (11 tools x 10)
        run: PYTHONPATH=src:. python scripts/validation_tool_tests_v2.py

      - name: Validation v3 (12 tools x 10)
        run: PYTHONPATH=src:. python scripts/validation_tool_tests_v3.py
